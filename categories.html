---
layout: default
title: Categories
---
<div class="wrapper">
    <div class="post-header">
        <h1 class="post-title">News by Category</h1>
    </div>

    <div class="post-content">
        {% for category in site.categories %}
            <!-- Use slugify here so it matches the link exactly -->
            <h2 id="{{ category[0] | slugify }}" style="border-bottom: 2px solid #111; padding-bottom: 10px; margin-top: 50px;">
                {{ category[0] | upcase }}
            </h2>
            
            <ul class="post-list" style="list-style: none; padding-left: 0;">
                {% for post in category[1] %}
                    <li style="margin-bottom: 15px;">
                        <span class="post-meta" style="display: inline-block; width: 120px;">{{ post.date | date: "%b %-d, %Y" }}</span>
                        <a href="{{ post.url | relative_url }}" style="font-weight: bold; font-family: var(--font-body); font-size: 18px;">{{ post.title }}</a>
                    </li>
                {% endfor %}
            </ul>
        {% endfor %}
    </div>
</div>
